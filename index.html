<!doctype html>
<meta charset="utf-8" />
<style>
  html,body{margin:0;background:transparent;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh;cursor:grab;opacity:0.75}
  canvas:active{cursor:grabbing}

#view{
  position:fixed;
  left:0; top:0; bottom:0;
  right:180px;         /* log panel width */
}
#c{ width:100%; height:100%; display:block; }

#hud{
  position:fixed; left:20px; bottom:0px;
  font:9px/1.35 ui-monospace,monospace;
  font-weight: 400;
  color:#57A0D2; pointer-events:none;
  text-shadow:0 0 6px rgba(63, 176, 199, 0.85),0 0 14px rgba(0,255,255,.55);opacity:1.0
}
.row{display:flex; gap:6px; margin:0px 0}
.k{ opacity:.85}

#logpanel {
  position:fixed; left:200px; top:50px;
  width:400px; height:260px;
  overflow:hidden;
  color:#00ffff;
  font: 8px/1.25 ui-monospace,monospace; /* Ensure font size is declared */
  pointer-events:auto; /* Modified: Re-enables mouse wheel and clicks */
  text-shadow:0 0 6px rgba(0,255,255,.7),0 0 14px rgba(0,255,255,.35);
}
#logtitle{opacity:.8; margin-bottom:6px}
#loglines {
  height:calc(100% - 18px);
  overflow-y:auto; /* Modified: Allows vertical scrolling */
  white-space:pre-wrap;
  scrollbar-width: thin; 
  scrollbar-color: rgba(0,255,255,0.5) transparent; 
}
.logI{opacity:.85}
.logW{color:#ffd84d; text-shadow:0 0 6px rgba(255,216,77,.7),0 0 14px rgba(255,216,77,.35)}
.logE{color:#ff4d4d; text-shadow:0 0 6px rgba(255,77,77,.7),0 0 14px rgba(255,77,77,.35)}

</style>

<div id="view"><canvas id="c"></canvas></div>

<div id="hud">
  <div class="row">
    <div class="k">CPU:</div><div id="cpu">--</div> 
    <div class="k">GPU:</div><div id="gpu">--</div>
    <div class="k">MEM:</div><div id="mem">--</div>
</div>
  <div class="row">
    <div class="k">NET:</div><div id="net">--</div>
</div>
  <div class="row">
    <div class="k">DISK:</div><div id="disk">--</div>
</div>

<div id="logpanel">
  <div id="logtitle"></div>
  <div id="loglines"></div>
</div>

<script type="module" src="./index.js"></script>
